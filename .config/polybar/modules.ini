[module/bspwm]
type = internal/bspwm
pin-workspaces = true

enable-scroll = true
scroll-up = bspc desktop -f prev.local
scroll-down = bspc desktop -f next.local

label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground = ${colors.background}
label-focused-padding = 1

label-occupied = %name%
; label-occupied-background = ${colors.color0}
label-occupied-foreground = ${colors.color2}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.color3}
label-urgent-padding = 1

label-empty = %name%
; label-empty-background = ${colors.color0}
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

label-separator = "∙"
label-separator-padding = 1
label-separator-foreground = ${colors.color1}

[module/mod]
type = internal/bspwm

format = <label-mode>
format-background = ${colors.color3}
format-foreground = ${colors.background}
format-padding = 1

label-monocle = "Monocle"
label-tiled = "Tiled"

label-floating = ", Float"
label-pseudotiled = ", Pseudo"
label-fullscreen = ", Full"

label-locked = " | Locked"
label-sticky = " | Sticky"
label-private = " | Private"

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾  "
format-volume-prefix-foreground = ${colors.color2}
format-volume = <label-volume>

label-volume = %percentage:2%%
label-volume-foreground = ${colors.foreground}

label-muted = muted
label-muted-foreground = ${colors.color1}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.color5}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu




interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.color6}
label = %percentage:2%%

[module/bandwidth]
type = internal/network
interface = wlp0s20f3
interval = 1.0

accumulate-stats = true

unknown-as-up = false

format-connected = <label-connected>
format-connected-foreground = ${colors.color2}

label-connected = "󰇚 %downspeed:7%  󰕒 %upspeed:7%"

format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.color1}
format-disconnected-prefix = "󰔟 "
label-disconnected = "Offline"


[module/wifi]
type = custom/script
exec = ~/.config/polybar/Scripts/wifi.sh
interval = 5

format = <label>
format-foreground = ${colors.color2}
label = %output%

click-left = ~/.config/polybar/Scripts/wifi_menu.sh

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/Scripts/bluetooth.sh
interval = 5

format = <label>
format-foreground = ${colors.color4}
label = %output%

click-left = ~/.config/polybar/Scripts/bluetooth_menu.sh

[module/ibus]
type = custom/script 
exec = ~/.config/polybar/Scripts/ibus_toggle.sh
interval = 1 
format = 󰌌  <label>
format-foreground = ${colors.color4}
label = %output%
click-left = ~/.config/polybar/Scripts/ibus_toggle.sh toggle

[module/date]
type = internal/date
interval = 1

format = 󰥔  <label>
format-foreground = ${colors.color4} 

date = %A %b, %d
;date-alt = 󰣐

time = %H:%M:%S
time-alt = Hello

label = %time% %date%
label-foreground = ${colors.foreground}

[module/box]
type = custom/text
format = <label>
format-background = ${colors.color5}
format-foreground = ${colors.background}
format-padding = 1

label = 󰣇 anbuiii
click-left = ~/.config/polybar/Scripts/power_menu.sh

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC0
poll-interval = 5

format-charging = <animation-charging>  <label-charging>
format-charging-foreground = ${colors.color2}
format-discharging = <ramp-capacity>  <label-discharging>
format-discharging-foreground = ${colors.color3}
format-full = <ramp-capacity>  <label-full>
format-full-foreground = ${colors.color2}
format-low = <label-low>
format-low-prefix = "󰂃  "
format-low-foreground = ${colors.color1}

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
label-low = %percentage%%

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-3 = 󰂈
animation-charging-4 = 󰂉
animation-charging-framerate = 750

[module/pkg_update]
type = custom/script
exec = ~/.config/polybar/Scripts/pkg_update.sh
interval = 600

format = <label> 
format-background = ${colors.color6}
format-foreground = ${colors.background}
format-padding = 1

label = 󰏔 %output%

click-left = wezterm start -- zsh -ic 'yay && bspc wm -r'

[module/disk]
type = internal/fs
mount-0 = /

interval = 30

fixed-values = true


label-mounted = %used% / %total%

format-unmounted = <label-unmounted>
format-unmounted-foreground = ${colors.color1}
label-unmounted = %mountpoint%: not mounted; [module/network]
